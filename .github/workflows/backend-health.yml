name: Backend Health

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run pytest
        run: pytest -q

  static-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt ruff mypy
      - name: Ruff lint
        run: ruff check src scripts tests
      - name: Mypy
        run: mypy --ignore-missing-imports --follow-imports=skip src/pdf_merge_gui/model.py src/pdf_merge_gui/services src/pdf_merge_gui/adapters src/pdf_merge_gui/domain scripts/perf_smoke.py scripts/report_baseline_metrics.py tests

  perf-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Ensure perf fixtures exist
        run: python tests/fixtures/setup_perf_fixtures.py
      - name: Report baseline metrics
        run: python scripts/report_baseline_metrics.py --baseline tests/perf_baseline_metrics.json --output artifacts/baseline_metrics.json --threshold 0.20
      - name: Upload baseline metrics artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-metrics
          path: artifacts/baseline_metrics.json
